<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>JobTracker • Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Supabase JS (UMD build) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-1">Sign in</h1>
                    <p class="text-muted mb-4">JobTracker API</p>

                    <div class="d-grid gap-2">
                        <button id="googleBtn" class="btn btn-primary" type="button">
                            Continue with Google
                        </button>
                    </div>

                    <div class="mt-3">
                        <small id="status" class="text-muted"></small>
                    </div>
                </div>
            </div>

            <p class="text-center text-muted mt-3 mb-0">© JobTracker</p>
        </div>
    </div>
</div>

<script>
    // supabase project auth values
    const SUPABASE_URL = "https://yoazzajeriqpcvolofyu.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Pat5ZFK64TZGg1OW4HBphg_SZbIjDVn";

    // const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("googleBtn").addEventListener("click", async () => {
        document.getElementById("status").textContent = "Redirecting to Google...";
        // const { error } = await supabase.auth.signInWithOAuth({
        const { error } = await sbClient.auth.signInWithOAuth({
            provider: "google",
            options: {
                // sends user back to your app after auth
                redirectTo: window.location.origin + "/auth/callback"
            }
        });
        if (error) document.getElementById("status").textContent = error.message;
    });
</script>
</body>
</html>
