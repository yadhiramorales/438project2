<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>JobTracker • Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-1">Sign in</h1>
                    <p class="text-muted mb-4">JobTracker API</p>

                    <!-- Spring Security adds ?error on failed login -->
                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        Invalid username or password.
                    </div>

                    <!-- Spring Security adds ?logout after logout -->
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        You’ve been signed out.
                    </div>

                    <form method="post" action="/login" class="vstack gap-3">
                        <!-- CSRF token is available as request attribute -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div>
                            <label for="username" class="form-label">Username</label>
                            <input id="username" name="username" type="text" class="form-control" autocomplete="username" required>
                        </div>

                        <div>
                            <label for="password" class="form-label">Password</label>
                            <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
                        </div>

                        <button class="btn btn-primary w-100" type="submit">Sign in</button>

                        <div class="text-center">
                            <a class="link-secondary" href="/">Back to home</a>
                        </div>
                    </form>
                </div>
            </div>

            <p class="text-center text-muted mt-3 mb-0">© JobTracker</p>
        </div>
    </div>
</div>
</body>
</html>
