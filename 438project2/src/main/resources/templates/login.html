<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>JobTracker • Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-1">Sign in</h1>
                    <p class="text-muted mb-4">JobTracker API</p>

                    <!-- Spring Security default expects username/password -->
                    <form method="post" action="/login">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input class="form-control" name="username" type="email" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input class="form-control" name="password" type="password" required />
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary" type="submit">Log in</button>
                        </div>

                        <div class="mt-3">
                            <small class="text-muted">
                                <span th:if="${param.error}">Invalid credentials.</span>
                                <span th:if="${param.logout}">You’ve been logged out.</span>
                            </small>
                        </div>
                    </form>

                </div>
            </div>

            <p class="text-center text-muted mt-3 mb-0">
                © JobTracker
            </p>
        </div>
    </div>
</div>
</body>
</html>
