name: Sync main to render branch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-render-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Force-update render branch from main
        run: |
          git push origin HEAD:render-prod --force